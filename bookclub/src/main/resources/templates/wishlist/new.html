<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>New Wishlist Item</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- Navbar -->
<div th:replace="header :: header"></div>

<div class="container mt-5">

    <h2 class="text-center mb-4">New Wishlist Item Form</h2>

    <form th:action="@{/wishlist}" th:object="${wishlistItem}" method="post">

        <div class="mb-3">
            <label class="form-label">ISBN</label>
            <input type="text" class="form-control" th:field="*{isbn}" />

            <small th:if="${#fields.hasErrors('isbn')}"
                   th:errors="*{isbn}"
                   style="color:red"></small>
        </div>

        <div class="mb-3">
            <label class="form-label">Title</label>
            <input type="text" class="form-control" th:field="*{title}" />

            <small th:if="${#fields.hasErrors('title')}"
                   th:errors="*{title}"
                   style="color:red"></small>
        </div>

        <div class="text-end">
            <button type="submit" class="btn btn-primary">Save</button>
        </div>

    </form>

    <br/>

    <a th:href="@{/wishlist}">Return to wishlist</a>

</div>

</body>
</html>
