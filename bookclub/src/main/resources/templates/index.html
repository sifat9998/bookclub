<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Bookclub</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- Header -->
<div th:replace="header :: header"></div>

<!-- Main Content -->
<div class="container mt-4">

    <h2 class="mb-3">Welcome to the Bookclub application!</h2>

    <hr/>

    <!-- Java -->
    <div class="mb-4">
        <h4>Java Basics</h4>
        <p>Intro to Java</p>
        <a th:href="@{/book/1}" class="btn btn-link">View</a>
    </div>

    <!-- Spring Boot -->
    <div class="mb-4">
        <h4>Spring Boot</h4>
        <p>Spring Boot Guide</p>
        <a th:href="@{/book/2}" class="btn btn-link">View</a>
    </div>

    <!-- Thymeleaf -->
    <div class="mb-4">
        <h4>Thymeleaf</h4>
        <p>Template Engine</p>
        <a th:href="@{/book/3}" class="btn btn-link">View</a>
    </div>

    <!-- Microservices -->
    <div class="mb-4">
        <h4>Microservices</h4>
        <p>Architecture</p>
        <a th:href="@{/book/4}" class="btn btn-link">View</a>
    </div>

    <!-- Docker -->
    <div class="mb-4">
        <h4>Docker</h4>
        <p>Containerization</p>
        <a th:href="@{/book/5}" class="btn btn-link">View</a>
    </div>

</div>

</body>
</html>
